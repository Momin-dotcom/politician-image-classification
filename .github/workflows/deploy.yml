name: Build, Test and Deploy

on:
  push:
    branches: [main]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create dummy model for testing
        run: python create_dummy_model.py

      - name: Run pytest
        run: pytest tests/ -v

  build-and-push:
    name: Build and Push Docker Image
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/politician-classifier:latest .

      - name: Push Docker image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/politician-classifier:latest

  deploy:
    name: Deploy to EC2
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH into EC2 and redeploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 10m
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/politician-classifier:latest &
            wait
            docker stop politician-api || true
            docker rm politician-api || true
            docker run -d \
              --name politician-api \
              -p 8000:8000 \
              --memory="900m" \
              --memory-swap="2g" \
              --restart unless-stopped \
              -v /home/ubuntu/best_model.pth:/app/models/best_model.pth \
              ${{ secrets.DOCKER_USERNAME }}/politician-classifier:latest
            docker ps
